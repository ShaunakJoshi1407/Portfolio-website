<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff9920;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ff9905;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="#ffffff08" stroke-width="1">
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="300" x2="900" y2="300"/>
    <line x1="0" y1="400" x2="900" y2="400"/>
    <line x1="150" y1="0" x2="150" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="450" y1="0" x2="450" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="750" y1="0" x2="750" y2="500"/>
  </g>

  <!-- Connection lines -->
  <g stroke="#00ff9930" stroke-width="1.5" stroke-dasharray="6,4">
    <!-- Top row to center -->
    <line x1="200" y1="120" x2="450" y2="230"/>
    <line x1="450" y1="120" x2="450" y2="230"/>
    <line x1="700" y1="120" x2="450" y2="230"/>
    <!-- Center to bottom row -->
    <line x1="450" y1="280" x2="200" y2="370"/>
    <line x1="450" y1="280" x2="450" y2="370"/>
    <line x1="450" y1="280" x2="700" y2="370"/>
  </g>

  <!-- Top row: User interfaces -->
  <!-- CLI box -->
  <rect x="120" y="70" width="160" height="60" rx="8" fill="url(#nodeGrad)" stroke="#00ff9940" stroke-width="1"/>
  <text x="200" y="96" fill="#00ff99" font-family="monospace" font-size="11" text-anchor="middle" font-weight="600">aictl CLI</text>
  <text x="200" y="114" fill="#ffffff60" font-family="monospace" font-size="10" text-anchor="middle">$ deploy tinyllama</text>

  <!-- HTTP Server box -->
  <rect x="370" y="70" width="160" height="60" rx="8" fill="url(#nodeGrad)" stroke="#00ff9940" stroke-width="1"/>
  <text x="450" y="96" fill="#00ff99" font-family="monospace" font-size="11" text-anchor="middle" font-weight="600">HTTP Tool Server</text>
  <text x="450" y="114" fill="#ffffff60" font-family="monospace" font-size="10" text-anchor="middle">POST /deploy</text>

  <!-- NL Interface box -->
  <rect x="620" y="70" width="160" height="60" rx="8" fill="url(#nodeGrad)" stroke="#00ff9940" stroke-width="1"/>
  <text x="700" y="96" fill="#00ff99" font-family="monospace" font-size="11" text-anchor="middle" font-weight="600">NL Interface</text>
  <text x="700" y="114" fill="#ffffff60" font-family="monospace" font-size="10" text-anchor="middle">"deploy model X"</text>

  <!-- Center: Controller -->
  <rect x="320" y="220" width="260" height="70" rx="10" fill="#00ff9912" stroke="#00ff9970" stroke-width="1.5" filter="url(#glow)"/>
  <text x="450" y="248" fill="#00ff99" font-family="monospace" font-size="13" text-anchor="middle" font-weight="700">AIDeployment CR</text>
  <text x="450" y="268" fill="#ffffff80" font-family="monospace" font-size="10" text-anchor="middle">Controller Reconcile Loop</text>
  <text x="450" y="282" fill="#ffffff40" font-family="monospace" font-size="9" text-anchor="middle">drift detection · status propagation</text>

  <!-- Bottom row: K8s resources -->
  <!-- Deployment -->
  <rect x="100" y="350" width="200" height="65" rx="8" fill="url(#nodeGrad)" stroke="#326CE540" stroke-width="1"/>
  <text x="200" y="376" fill="#326CE5" font-family="monospace" font-size="11" text-anchor="middle" font-weight="600">Deployment</text>
  <text x="200" y="394" fill="#ffffff50" font-family="monospace" font-size="9" text-anchor="middle">replicas · image · resources</text>
  <text x="200" y="408" fill="#ffffff30" font-family="monospace" font-size="9" text-anchor="middle">ollama/ollama:latest</text>

  <!-- Service -->
  <rect x="350" y="350" width="200" height="65" rx="8" fill="url(#nodeGrad)" stroke="#326CE540" stroke-width="1"/>
  <text x="450" y="376" fill="#326CE5" font-family="monospace" font-size="11" text-anchor="middle" font-weight="600">Service</text>
  <text x="450" y="394" fill="#ffffff50" font-family="monospace" font-size="9" text-anchor="middle">ClusterIP · NodePort</text>
  <text x="450" y="408" fill="#ffffff30" font-family="monospace" font-size="9" text-anchor="middle">LoadBalancer</text>

  <!-- HPA -->
  <rect x="600" y="350" width="200" height="65" rx="8" fill="url(#nodeGrad)" stroke="#326CE540" stroke-width="1"/>
  <text x="700" y="376" fill="#326CE5" font-family="monospace" font-size="11" text-anchor="middle" font-weight="600">HPA</text>
  <text x="700" y="394" fill="#ffffff50" font-family="monospace" font-size="9" text-anchor="middle">minReplicas · maxReplicas</text>
  <text x="700" y="408" fill="#ffffff30" font-family="monospace" font-size="9" text-anchor="middle">CPU / memory targets</text>

  <!-- Prometheus metrics indicator -->
  <rect x="720" y="220" width="150" height="45" rx="6" fill="#E6522C12" stroke="#E6522C40" stroke-width="1"/>
  <text x="795" y="240" fill="#E6522C" font-family="monospace" font-size="10" text-anchor="middle" font-weight="600">Prometheus</text>
  <text x="795" y="256" fill="#ffffff40" font-family="monospace" font-size="9" text-anchor="middle">reconcile metrics</text>
  <line x1="720" y1="242" x2="580" y2="255" stroke="#E6522C30" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Title watermark -->
  <text x="450" y="475" fill="#ffffff15" font-family="monospace" font-size="13" text-anchor="middle" font-weight="500" letter-spacing="3">AI INFERENCE ORCHESTRATOR</text>
</svg>
